[project]
name = "arkenos-custom-agent-base"
version = "0.1.0"
description = "Base dependencies for Arkenos custom agent containers"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    # LiveKit Agents SDK and plugins
    "livekit-agents>=0.12.3",
    "livekit-plugins-deepgram>=0.6.0",
    "livekit-plugins-assemblyai>=0.2.0",
    "livekit-plugins-elevenlabs>=0.8.0",
    "livekit-plugins-silero>=0.7.0",
    "livekit-plugins-google>=0.9.0",

    # HTTP and async
    "httpx>=0.28.0",
    "aiohttp>=3.9.0",

    # Data and validation
    "pydantic>=2.0.0",
    "numpy>=1.26.0",
    "pandas>=2.1.0",

    # Object storage
    "minio>=7.2.0",

    # LLM orchestration
    "langgraph>=0.2.0",
    "langchain-core>=0.3.0",

    # Utilities
    "python-dotenv>=1.0.0",
]

[tool.setuptools]
py-modules = []
