# Arkenos Docker Compose
#
# Setup:
#   cp .env.example .env    # edit with your values
#   docker-compose up -d --build
#
# Only 1 env var required (POSTGRES_PASSWORD).
# All provider keys (LiveKit, Google, Resemble, Twilio, STT) are
# configured via API Keys in the dashboard after first boot.

name: arkenos

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: arkenos-db
    environment:
      POSTGRES_DB: arkenos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arkenos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # MinIO Object Storage
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: arkenos-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9002:9000"
      - "9003:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # Backend API (FastAPI)
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arkenos-backend
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arkenos}
      DB_HOST: postgres
      MINIO_ENDPOINT: minio:9000
      FRONTEND_URL: http://localhost:4200
    ports:
      - "4201:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ============================================
  # Voice Agent (LiveKit)
  # ============================================
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: arkenos-agent
    environment:
      BACKEND_API_URL: http://backend:8000/api
    depends_on:
      - backend
    restart: unless-stopped

  # ============================================
  # Frontend (Next.js)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4201/api
    container_name: arkenos-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4201/api
      INTERNAL_API_URL: http://backend:8000/api
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-arkenos}@postgres:5432/arkenos
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-arkenos-default-secret-change-in-production}
      BETTER_AUTH_URL: http://localhost:4200
      NEXT_PUBLIC_TELEMETRY: ${TELEMETRY:-true}
    ports:
      - "4200:3000"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
