# ╔══════════════════════════════════════════════════════════════╗
# ║  Arkenos — Render 1-Click Deploy                            ║
# ║  https://docs.render.com/infrastructure-as-code             ║
# ╚══════════════════════════════════════════════════════════════╝
#
# WHAT THIS DEPLOYS (all in one project):
#   1. PostgreSQL 16 (managed)     — shared by backend + frontend
#   2. arkenos-backend (FastAPI)   — API server, runs migrations on boot
#   3. arkenos-frontend (Next.js)  — dashboard UI
#   4. arkenos-agent (LiveKit)     — voice agent background worker
#
# ┌─────────────────────────────────────────────────────────────┐
# │  ZERO-CONFIG DEPLOY                                         │
# │                                                             │
# │  1. Click "Deploy to Render" — everything auto-wires        │
# │  2. Wait for all services to go green (~3-5 min)            │
# │  3. Open the frontend URL → Dashboard → API Keys            │
# │  4. Add your provider keys (LiveKit, Google, etc.)          │
# │                                                             │
# │  No secrets or env vars needed at deploy time.              │
# │  All provider keys are configured from the dashboard UI.    │
# └─────────────────────────────────────────────────────────────┘
#
# NOTE: Custom Agents (code editor + Docker containers) are not
#       supported on Render. That feature requires self-hosted
#       deployment with Docker socket access.

databases:
  - name: arkenos-db
    plan: basic_256mb
    databaseName: arkenos
    user: arkenos
    region: oregon

services:
  # ── Backend API (FastAPI) ─────────────────────────────────
  - type: web
    name: arkenos-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      # Database — auto-wired from managed PostgreSQL
      - key: DATABASE_URL
        fromDatabase:
          name: arkenos-db
          property: connectionString
      # CORS — auto-wired from frontend service URL
      - key: FRONTEND_URL
        fromService:
          type: web
          name: arkenos-frontend
          property: hostport
      # Production defaults
      - key: DEBUG
        value: "false"
      # Provider keys (LiveKit, Google, Resemble, Twilio, STT) are all
      # configured via Dashboard → API Keys. No env vars needed here.

  # ── Frontend (Next.js) ────────────────────────────────────
  - type: web
    name: arkenos-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    plan: starter
    region: oregon
    envVars:
      # Backend URL — auto-wired. The app auto-appends /api.
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: arkenos-backend
          property: hostport
      - key: INTERNAL_API_URL
        fromService:
          type: web
          name: arkenos-backend
          property: hostport
      # Auth — secret auto-generated, callback URL auto-wired
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        fromService:
          type: web
          name: arkenos-frontend
          property: hostport
      # Database — auto-wired (Better Auth session storage)
      - key: DATABASE_URL
        fromDatabase:
          name: arkenos-db
          property: connectionString
      # Runtime
      - key: NODE_VERSION
        value: "20"
      # Provider keys (LiveKit, Deepgram, Google) are configured
      # via Dashboard → API Keys. No env vars needed here.

  # ── Voice Agent (LiveKit Background Worker) ───────────────
  - type: worker
    name: arkenos-agent
    runtime: docker
    rootDir: agent
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    envVars:
      # Backend URL — auto-wired. The agent auto-appends /api.
      - key: BACKEND_API_URL
        fromService:
          type: web
          name: arkenos-backend
          property: hostport
      # Provider keys (LiveKit, STT, LLM, TTS) are fetched from the
      # backend dashboard on startup. No env vars needed here.
